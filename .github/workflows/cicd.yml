name: CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─────────────────────────────
  # JOB 1: TEST
  # ─────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

  # ─────────────────────────────
  # JOB 2: BUILD & PUSH
  # ─────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/todo-app:latest

  # ─────────────────────────────
  # JOB 3: DEPLOY
  # ─────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: doctl kubernetes cluster kubeconfig save todo-cluster

      - name: Update image
        run: |
          kubectl set image deployment/todo-app \
            todo-app=${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }}

      - name: Verify rollout
        run: kubectl rollout status deployment/todo-app --timeout=120s